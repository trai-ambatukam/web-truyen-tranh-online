<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Truyện Tranh</title>

<style>
*{
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    background: linear-gradient(-45deg,#fbc2eb,#a6c1ee,#fddb92,#d1fdff);
    background-size:400% 400%;
    animation: gradientBG 15s ease infinite;
    padding:40px 20px;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.page-title{
    text-align:center;
    font-size:38px;
    font-weight:700;
    margin-bottom:40px;
    color:#fff;
    letter-spacing:2px;
    text-shadow:0 4px 10px rgba(0,0,0,0.25);
}

.comic-container{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:35px;
}

.comic-card{
    background:#ffffff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
    text-align:center;
    padding-bottom:20px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.comic-card:hover{
    transform: translateY(-10px) scale(1.03);
    box-shadow:0 25px 45px rgba(0,0,0,0.25);
}

.comic-image{
    width:100%;
    aspect-ratio:3/4;
    overflow:hidden;
    padding:13px 13px 0 13px;
}
.comic-image img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    border-radius:12px;
}
.comic-title{
    font-size:20px;
    font-weight:600;
    margin-top:18px;
    color:#333;
}

.comic-price{
    margin:15px 0;
    font-size:22px;
    font-weight:bold;
    color:#e74c3c;
}

.add-cart-btn{
    border:none;
    background:#2ecc71;
    color:white;
    padding:12px 30px;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.add-cart-btn:hover{
    transform: translateY(-3px) scale(1.05);
    box-shadow:0 8px 18px rgba(0,0,0,0.25);
}
</style>

</head>

<body>

<h1 class="page-title">WEB TRUYỆN TRANH ONLINE</h1>

<div class="comic-container" id="comicContainer"></div>

<script>
const comics=[
{
name:"One Piece",
price:250000,
image:"1.jpg"
},
{
name:"Naruto",
price:220000,
image:"2.jpg"
},
{
name:"Dragon Ball",
price:240000,
image:"3.jpg"
},
{
name:"Attack on Titan",
price:280000,
image:"4.jpg"
},
{
name:"Demon Slayer",
price:260000,
image:"5.jpg"
},
{
name:"Fairy Tail",
price:230000,
image:"6.jpg"
}
];

const container=document.getElementById("comicContainer");

comics.forEach(comic=>{
const card=document.createElement("div");
card.className="comic-card";

card.innerHTML=`
<div class="comic-image">
<img src="${comic.image}" alt="${comic.name}">
</div>

<div class="comic-title">${comic.name}</div>

<div class="comic-price">${comic.price.toLocaleString()} đ</div>

<button class="add-cart-btn">Thêm vào giỏ</button>
`;

card.querySelector(".add-cart-btn").onclick=()=>{
alert("Đã thêm \""+comic.name+"\" vào giỏ!");
};

container.appendChild(card);
});
</script>

</body>
</html>
